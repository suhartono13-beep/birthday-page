<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生日快乐 🎂 - 许个愿吧 ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
    <style>
        :root {
            /* 主题色：柔和的桃色 */
            --primary-color: #ff8a71;
            /* 烛光金 */
            --candle-color: #FFD700;
        }

        body {
            margin: 0;
            /* 温暖、金色的燭光漸變背景，模拟图像整体色调 */
            background: linear-gradient(135deg, #1a1a1a, #2c2c2c, #4a4a4a);
            font-family: 'ZCOOL KuaiLe', sans-serif; /* 默认庆祝体 */
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #fff;
        }

        /* 外部背景波卡（Bokeh）粒子层 */
        .page-background {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* 高级玻璃拟态卡片 
           Glassmorphism: background blur, semi-transparent white, border
           同时融合了图像中的木桌纹理
        */
        .card {
            width: 85%;
            max-width: 420px;
            /* 使用图像中的木桌纹理作为卡片背景的一部分，增加真实感 */
            background: linear-gradient(rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.05)), 
                        url(''https://images.unsplash.com/photo-1558636508-e0db3814bd1d?q=80&w=800&auto=format&fit=crop'') center/cover no-repeat;
            /* 关键：背景模糊效果 */
            backdrop-filter: blur(15px) saturate(180%);
            -webkit-backdrop-filter: blur(15px) saturate(180%);
            border-radius: 24px;
            padding: 40px 20px;
            text-align: center;
            /* 柔和的阴影 */
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            /* 半透明边框，增加质感 */
            border: 1px solid rgba(255, 255, 255, 0.2);
            z-index: 10;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
        }

        /* 卡片整体微光效果 */
        .card.glow-card {
            box-shadow: 0 20px 80px rgba(255, 215, 0, 0.6);
            animation: pulseCard 2s infinite ease-in-out;
        }

        @keyframes pulseCard {
            0% { box-shadow: 0 20px 50px rgba(255, 215, 0, 0.4); }
            50% { box-shadow: 0 20px 80px rgba(255, 215, 0, 0.8); }
            100% { box-shadow: 0 20px 50px rgba(255, 215, 0, 0.4); }
        }

        /* 优雅的书法体标题，带有强大的发光效果 */
        #title.calligraphy {
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 32px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 5px;
            /* 复杂的层叠文字发光 */
            text-shadow: 0 0 10px #fff,
                         0 0 20px var(--candle-color),
                         0 0 30px var(--candle-color),
                         0 0 40px var(--candle-color);
            animation: textPulse 2s infinite;
        }

        #sub-title.celebra {
            font-family: 'ZCOOL KuaiLe', sans-serif;
            font-size: 20px;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 30px;
            text-shadow: 0 0 5px #fff;
        }

        @keyframes textPulse {
            0% { text-shadow: 0 0 10px #fff, 0 0 20px var(--candle-color), 0 0 30px var(--candle-color), 0 0 40px var(--candle-color); }
            50% { text-shadow: 0 0 15px #fff, 0 0 25px var(--candle-color), 0 0 35px var(--candle-color), 0 0 45px var(--candle-color); }
            100% { text-shadow: 0 0 10px #fff, 0 0 20px var(--candle-color), 0 0 30px var(--candle-color), 0 0 40px var(--candle-color); }
        }

        /* 前景合十的手和蛋糕图像区域 */
        .cake-wrapper {
            position: relative;
            margin: 20px 0;
            display: inline-block;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            /* 确保图像保持比例且居中 */
            width: 100%;
            height: 250px;
            background: url(''https://images.unsplash.com/photo-1558636508-e0db3814bd1d?q=80&w=800&auto=format&fit=crop'') center/contain no-repeat;
            /* 模糊的前景合十双手效果 */
            mask-image: linear-gradient(to top, rgba(0,0,0,0) 0%, rgba(0,0,0,1) 50%);
            -webkit-mask-image: linear-gradient(to top, rgba(0,0,0,0) 0%, rgba(0,0,0,1) 50%);
        }

        .cake-wrapper:hover { transform: scale(1.03); }
        .cake-wrapper:active { transform: scale(0.98); }

        /* 燭光微光效果 (drop-shadow) */
        .glow {
            filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.9)) 
                    drop-shadow(0 0 40px rgba(255, 215, 0, 0.7));
            animation: pulseGlow 1.5s infinite ease-in-out;
        }

        @keyframes pulseGlow {
            0% { filter: drop-shadow(0 0 15px rgba(255, 215, 0, 0.6)) drop-shadow(0 0 30px rgba(255, 215, 0, 0.4)); }
            50% { filter: drop-shadow(0 0 25px rgba(255, 215, 0, 1)) drop-shadow(0 0 50px rgba(255, 215, 0, 0.8)); }
            100% { filter: drop-shadow(0 0 15px rgba(255, 215, 0, 0.6)) drop-shadow(0 0 30px rgba(255, 215, 0, 0.4)); }
        }

        /* 按钮样式 - 庆祝感风格 */
        .btn {
            width: 100%;
            padding: 16px;
            margin-top: 25px;
            border-radius: 50px;
            border: none;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'ZCOOL KuaiLe', sans-serif;
            letter-spacing: 1px;
        }

        .primary {
            background: var(--primary-color);
            color: white;
            box-shadow: 0 4px 15px rgba(255, 138, 113, 0.4);
            border: 1px solid rgba(255, 138, 113, 0.6);
        }

        .primary:hover { 
            background: #ff7657; 
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 138, 113, 0.6);
        }

        .hidden { display: none !important; opacity: 0; }

        /* 烟花/粒子容器 */
        .particles-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 99;
        }

        /* 烟花粒子 */
        .firework {
            position: absolute;
            width: 8px; /* 稍微增加大小 */
            height: 8px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 99;
            box-shadow: 0 0 10px currentcolor; /* 增加发光 */
        }
    </style>
</head>
<body>

<div class="page-background" id="pageBg">
    </div>

<div class="card glow-card" id="cardMain">
    <h1 id="title" class="calligraphy glow-text">许个愿吧 ✨</h1>
    <h2 id="sub-title" class="celebra glow-text">生日快乐</h2>
    
    <div id="cake" class="cake-wrapper glow" onclick="handleCakeClick()">
        </div>
    
    <p id="hint" style="color: rgba(255,255,255,0.8); font-size: 14px; font-weight: 500; margin-top: 10px;">点击蛋糕点燃烛光</p>
    <button id="blowBtn" class="btn primary hidden" onclick="blowCandles()">💨 吹灭蜡烛</button>
</div>

<div class="particles-container" id="particlesContainer">
    </div>

<audio id="music" loop preload="auto">
    <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
let step = 0;
// 烟花颜色列表，增加了更多高饱和度的节日颜色，呼应图像中的多彩
const fireworkColors = ['#ff6b81', '#ff4757', '#ffa502', '#2ed573', '#1e90ff', '#ffffff', '#FFD700', '#FF1493', '#9370DB', '#00FFFF'];

// 初始化：生成外部波卡粒子背景
generatePageBackground();

// 1. 点击蛋糕（合十的手和蛋糕区域）点燃
function handleCakeClick() {
    if (step === 0) {
        document.getElementById("hint").classList.add("hidden");
        document.getElementById("blowBtn").classList.remove("hidden");
        // 如果想预留麦克风吹气，可以在这里开始音频监听
        step = 1;
    }
}

// 2. 吹蜡烛
function blowCandles() {
    const audio = document.getElementById("music");
    audio.play().catch(() => console.log("请点击屏幕以播放音乐"));

    // 移除发光效果和微光动画
    document.getElementById("cake").classList.remove("glow");
    document.getElementById("cardMain").classList.remove("glow-card");
    document.getElementById("title").classList.remove("glow-text");
    document.getElementById("sub-title").classList.remove("glow-text");

    // 改变文本
    document.getElementById("title").innerText = "✨ 愿你所求皆如愿 ✨";
    document.getElementById("title").style.fontSize = "24px"; /* 稍微缩小 */
    document.getElementById("sub-title").innerText = "🎂 生日快乐 🥂";
    document.getElementById("blowBtn").style.display = "none";

    // 改变蛋糕图像（模拟移除蜡烛或切换到切开状态）
    // 为了保持视觉连续性，这里使用蒙版淡出或移除部分区域
    const cake = document.getElementById("cake");
    cake.style.maskImage = 'none'; // 移除合十手模糊蒙版
    cake.style.webkitMaskImage = 'none';

    // 启动增强版烟花
    launchFireworks();

    // 弹出警报祝贺
    setTimeout(() => {
        alert("🎉 祝你生日快乐！愿所有愿望都成真！✨");
    }, 1000);
}

// 3. 生成外部波卡粒子背景
function generatePageBackground() {
    const bg = document.getElementById("pageBg");
    const particleCount = 20; // 背景圆点数量

    for (let i = 0; i < particleCount; i++) {
        const p = document.createElement("div");
        p.style.position = "absolute";
        const size = Math.random() * 80 + 20; // 大小不一
        p.style.width = size + "px";
        p.style.height = size + "px";
        p.style.borderRadius = "50%";
        p.style.background = `rgba(${Math.random()*255}, ${Math.random()*255}, ${Math.random()*255}, 0.2)`;
        p.style.filter = "blur(10px)";
        p.style.left = Math.random() * 100 + "vw";
        p.style.top = Math.random() * 100 + "vh";
        p.style.opacity = Math.random();
        p.style.animation = `floatBg ${Math.random()*20 + 10}s infinite ease-in-out`;
        bg.appendChild(p);
    }
}

// 4. 增强版烟花逻辑
function launchFireworks() {
    const container = document.getElementById("particlesContainer");
    const duration = 15 * 1000; // 持续放15秒
    const end = Date.now() + duration;

    const interval = setInterval(() => {
        if (Date.now() > end) return clearInterval(interval);

        const x = Math.random() * window.innerWidth;
        const y = Math.random() * window.innerHeight * 0.7; /* 烟花大部分在卡片上方 */
        const color = fireworkColors[Math.floor(Math.random() * fireworkColors.length)];

        for (let i = 0; i < 30; i++) { /* 粒子数量增加 */
            createParticle(x, y, color, container);
        }
    }, 350); /* 频率稍微增加 */
}

function createParticle(x, y, color, container) {
    const p = document.createElement("div");
    p.className = "firework";
    p.style.left = x + "px";
    p.style.top = y + "px";
    p.style.backgroundColor = color;
    p.style.color = color;
    container.appendChild(p);

    const angle = Math.random() * Math.PI * 2;
    const velocity = Math.random() * 150 + 60; // 爆裂范围增加
    const tx = Math.cos(angle) * velocity;
    const ty = Math.sin(angle) * velocity;

    const anim = p.animate([
        { transform: 'translate(0, 0) scale(1)', opacity: 1 },
        { transform: `translate(${tx}px, ${ty}px) scale(0)`, opacity: 0 }
    ], {
        duration: 1000 + Math.random() * 500,
        easing: 'cubic-bezier(0, .9, .57, 1)' // 贝塞尔曲线，先快后慢
    });

    anim.onfinish = () => p.remove();
}

// CSS 动画定义
const styleSheet = document.createElement("style");
styleSheet.innerText = `
@keyframes floatBg {
    0% { transform: translate(0, 0); }
    50% { transform: translate(${Math.random()*50-25}px, ${Math.random()*50-25}px); }
    100% { transform: translate(0, 0); }
}
`;
document.head.appendChild(styleSheet);
</script>

</body>
</html>
