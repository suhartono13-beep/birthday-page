```html
<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>生日快乐 🎂</title>

<style>
body {
    margin: 0;
    background: #f5f5f5;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}

/* 居中页面 */
.page {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* 卡片 */
.card {
    width: 90%;
    max-width: 420px;
    background: white;
    border-radius: 20px;
    padding: 25px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

/* 按钮 */
.btn {
    width: 100%;
    padding: 14px;
    margin-top: 15px;
    border-radius: 12px;
    border: none;
    font-size: 16px;
}

.primary { background: #ff6b81; color: white; }
.secondary { background: #eee; }

/* 蛋糕 */
.cake {
    font-size: 60px;
    margin: 20px 0;
    cursor: pointer;
}

/* 隐藏 */
.hidden { display: none; }

/* 烟花 */
.firework {
    position: absolute;
    width: 5px;
    height: 5px;
    background: orange;
    border-radius: 50%;
}
</style>
</head>

<body>

<div class="page">
    <div class="card">

        <h2 id="title">🎂 点蛋糕开始</h2>

        <div id="cake" class="cake">🎂</div>

        <button id="blowBtn" class="btn secondary hidden" onclick="blowCandles()">💨 吹蜡烛</button>

    </div>
</div>

<audio id="music" loop>
    <source src="music.mp3">
</audio>

<script>
let step = 0;

// 点蛋糕
document.getElementById("cake").onclick = () => {
    if (step === 0) {
        document.getElementById("title").innerText = "许个愿吧 ✨";
        document.getElementById("blowBtn").classList.remove("hidden");
        step = 1;
    }
};

// 吹蜡烛
function blowCandles() {
    let m = document.getElementById("music");

    m.play().catch(()=>{});

    document.getElementById("title").innerText = "🎉 生日快乐！🎉";
    document.getElementById("blowBtn").classList.add("hidden");

    launchFireworks();

    alert("🎂 祝你生日快乐！愿所有愿望都实现 ✨");
}

// 烟花
function launchFireworks() {
    setInterval(() => {
        let x = Math.random() * window.innerWidth;
        let y = Math.random() * window.innerHeight;

        for (let i = 0; i < 15; i++) {
            let fw = document.createElement("div");
            fw.className = "firework";
            fw.style.left = x + "px";
            fw.style.top = y + "px";
            document.body.appendChild(fw);

            let angle = Math.random() * 2 * Math.PI;
            let d = Math.random() * 100;

            fw.animate([
                { transform: "translate(0,0)" },
                { transform: `translate(${Math.cos(angle)*d}px, ${Math.sin(angle)*d}px)` }
            ], { duration: 800 });

            setTimeout(() => fw.remove(), 800);
        }
    }, 500);
}
</script>

</body>
</html>
