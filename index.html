<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生日快乐 🎂</title>
    <style>
        :root {
            --primary-color: #ff6b81;
            --bg-color: #fceef0;
        }

        body {
            margin: 0;
            background: var(--bg-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* 卡片容器 */
        .card {
            width: 85%;
            max-width: 380px;
            background: white;
            border-radius: 24px;
            padding: 40px 20px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(255, 107, 129, 0.2);
            z-index: 10;
            transition: transform 0.3s ease;
        }

        #title {
            color: #444;
            margin-bottom: 30px;
            font-weight: 600;
        }

        /* 蛋糕动画 */
        .cake-wrapper {
            font-size: 80px;
            margin: 20px 0;
            cursor: pointer;
            user-select: none;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: inline-block;
        }

        .cake-wrapper:hover { transform: scale(1.1); }
        .cake-wrapper:active { transform: scale(0.9); }

        /* 烛光微光效果 */
        .glow {
            filter: drop-shadow(0 0 15px rgba(255, 200, 0, 0.8));
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { filter: drop-shadow(0 0 5px rgba(255, 200, 0, 0.5)); }
            50% { filter: drop-shadow(0 0 20px rgba(255, 200, 0, 0.9)); }
            100% { filter: drop-shadow(0 0 5px rgba(255, 200, 0, 0.5)); }
        }

        /* 按钮样式 */
        .btn {
            width: 100%;
            padding: 16px;
            margin-top: 25px;
            border-radius: 50px;
            border: none;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        .primary {
            background: var(--primary-color);
            color: white;
            box-shadow: 0 4px 15px rgba(255, 107, 129, 0.4);
        }

        .primary:hover { background: #ff4757; transform: translateY(-2px); }

        .hidden { display: none; opacity: 0; }

        /* 烟花粒子 */
        .firework {
            position: absolute;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 99;
        }
    </style>
</head>
<body>

<div class="card">
    <h2 id="title">🎂 有人过生日吗？</h2>
    <div id="cake" class="cake-wrapper">🎂</div>
    <p id="hint" style="color: #999; font-size: 14px;">点击蛋糕点燃蜡烛</p>
    <button id="blowBtn" class="btn primary hidden" onclick="blowCandles()">💨 吹灭蜡烛，许个愿</button>
</div>

<audio id="music" loop>
    <source src="https://m801.music.126.net/20240320/birthday_song.mp3" type="audio/mpeg">
</audio>

<script>
let step = 0;
const colors = ['#ff6b81', '#ff4757', '#747d8c', '#ffa502', '#2ed573', '#1e90ff', '#ffffff'];

// 1. 点击蛋糕点燃
document.getElementById("cake").onclick = function() {
    if (step === 0) {
        this.classList.add("glow");
        document.getElementById("title").innerText = "愿望都在心里了吗？";
        document.getElementById("hint").classList.add("hidden");
        document.getElementById("blowBtn").classList.remove("hidden");
        step = 1;
    }
};

// 2. 吹蜡烛
function blowCandles() {
    const audio = document.getElementById("music");
    audio.play().catch(() => console.log("等待交互后播放音乐"));

    document.getElementById("cake").classList.remove("glow");
    document.getElementById("cake").innerText = "🍰"; 
    document.getElementById("title").innerText = "✨ 愿你所求皆如愿 ✨";
    document.getElementById("blowBtn").style.display = "none";

    launchFireworks();
}

// 3. 增强版烟花逻辑
function launchFireworks() {
    const duration = 15 * 1000; // 持续放15秒
    const end = Date.now() + duration;

    const interval = setInterval(() => {
        if (Date.now() > end) return clearInterval(interval);

        const x = Math.random() * window.innerWidth;
        const y = Math.random() * window.innerHeight;
        const color = colors[Math.floor(Math.random() * colors.length)];

        for (let i = 0; i < 20; i++) {
            createParticle(x, y, color);
        }
    }, 400);
}

function createParticle(x, y, color) {
    const p = document.createElement("div");
    p.className = "firework";
    p.style.left = x + "px";
    p.style.top = y + "px";
    p.style.backgroundColor = color;
    document.body.appendChild(p);

    const angle = Math.random() * Math.PI * 2;
    const velocity = Math.random() * 120 + 50;
    const tx = Math.cos(angle) * velocity;
    const ty = Math.sin(angle) * velocity;

    const anim = p.animate([
        { transform: 'translate(0, 0) scale(1)', opacity: 1 },
        { transform: `translate(${tx}px, ${ty}px) scale(0)`, opacity: 0 }
    ], {
        duration: 1000 + Math.random() * 500,
        easing: 'cubic-bezier(0, .9, .57, 1)'
    });

    anim.onfinish = () => p.remove();
}
</script>

</body>
</html>
