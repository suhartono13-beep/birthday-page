<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生日快乐 🎂 - 许个愿吧 ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
    <style>
        :root {
            var(--primary-color): #ff8a71;
            --candle-color: #FFD700;
        }

        body {
            margin: 0;
            background: linear-gradient(135deg, #1a1a1a, #2c2c2c, #4a4a4a);
            font-family: 'ZCOOL KuaiLe', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #fff;
        }

        .page-background {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .card {
            width: 85%;
            max-width: 420px;
            /* 替换为你自己的背景图，或者保留半透明效果 */
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px) saturate(180%);
            -webkit-backdrop-filter: blur(15px) saturate(180%);
            border-radius: 24px;
            padding: 40px 20px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.2);
            z-index: 10;
            transition: all 0.5s ease;
        }

        .card.glow-card {
            box-shadow: 0 20px 80px rgba(255, 215, 0, 0.6);
            animation: pulseCard 2s infinite ease-in-out;
        }

        @keyframes pulseCard {
            0% { box-shadow: 0 20px 50px rgba(255, 215, 0, 0.4); }
            50% { box-shadow: 0 20px 80px rgba(255, 215, 0, 0.8); }
            100% { box-shadow: 0 20px 50px rgba(255, 215, 0, 0.4); }
        }

        #title.calligraphy {
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 32px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 5px;
            text-shadow: 0 0 10px #fff, 0 0 20px var(--candle-color), 0 0 30px var(--candle-color);
            transition: all 0.5s ease;
        }

        #sub-title {
            font-family: 'ZCOOL KuaiLe', sans-serif;
            font-size: 20px;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 30px;
        }

        /* 蛋糕容器 */
        .cake-wrapper {
            position: relative;
            margin: 20px auto;
            display: block;
            width: 100%;
            height: 250px;
            /* 这里可以放一张蛋糕图片，我先用emoji代替确保你能看到效果 */
            font-size: 100px;
            line-height: 250px;
            cursor: pointer;
            transition: all 0.5s ease;
        }

        .glow {
            filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.9));
            animation: pulseGlow 1.5s infinite ease-in-out;
        }

        @keyframes pulseGlow {
            0% { filter: drop-shadow(0 0 15px rgba(255, 215, 0, 0.6)); }
            50% { filter: drop-shadow(0 0 30px rgba(255, 215, 0, 1)); }
            100% { filter: drop-shadow(0 0 15px rgba(255, 215, 0, 0.6)); }
        }

        /* 相册容器 (默认隐藏) */
        .album-wrapper {
            display: none;
            width: 100%;
            height: 250px;
            margin: 20px auto;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        /* 轮播图片 */
        #slideImg {
            width: 100%;
            height: 100%;
            object-fit: cover; /* 保证图片不变形，铺满容器 */
            opacity: 0; /* 初始透明，用于淡入淡出动画 */
            transition: opacity 0.8s ease-in-out;
        }

        .btn {
            width: 100%;
            padding: 16px;
            margin-top: 25px;
            border-radius: 50px;
            border: none;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            background: #ff8a71;
            color: white;
            transition: all 0.2s;
        }

        .btn:hover { background: #ff7657; transform: translateY(-2px); }
        .hidden { display: none !important; }

        .particles-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 99;
        }

        .firework {
            position: absolute;
            width: 8px; height: 8px;
            border-radius: 50%;
            box-shadow: 0 0 10px currentcolor;
        }
    </style>
</head>
<body>

<div class="page-background" id="pageBg"></div>

<div class="card glow-card" id="cardMain">
    <h1 id="title" class="calligraphy">许个愿吧 ✨</h1>
    <h2 id="sub-title">生日快乐</h2>
    
    <div id="cake" class="cake-wrapper glow" onclick="handleCakeClick()">
        🎂
    </div>

    <div id="album" class="album-wrapper">
        <img id="slideImg" src="" alt="回忆相册">
    </div>
    
    <p id="hint" style="color: rgba(255,255,255,0.8); font-size: 14px; margin-top: 10px;">点击蛋糕点燃烛光</p>
    <button id="blowBtn" class="btn hidden" onclick="blowCandles()">💨 吹灭蜡烛</button>
</div>

<div class="particles-container" id="particlesContainer"></div>

<audio id="music" loop preload="auto">
    <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
let step = 0;
const fireworkColors = ['#ff6b81', '#ff4757', '#ffa502', '#2ed573', '#1e90ff', '#ffffff', '#FFD700', '#FF1493'];

// ==============================
// 📸 在这里配置你的轮播图片路径！
// ==============================
const photos = [
    // 你可以换成本地图片，例如：'img/photo1.jpg', 'img/photo2.jpg'
    'img/photo1.jpg',
    'img/photo2.jpg',
    'img/photo3.jpg',
    'img/photo4.jpg',
    'img/photo5.jpg'
];
let currentPhotoIndex = 0;

generatePageBackground();

function handleCakeClick() {
    if (step === 0) {
        document.getElementById("hint").classList.add("hidden");
        document.getElementById("blowBtn").classList.remove("hidden");
        step = 1;
    }
}

function blowCandles() {
    // 1. 播放音乐
    const audio = document.getElementById("music");
    audio.play().catch(() => console.log("请点击屏幕播放音乐"));

    // 2. 停止卡片发光
    document.getElementById("cardMain").classList.remove("glow-card");
    document.getElementById("title").style.textShadow = "none";

    // 3. 修改文案
    document.getElementById("title").innerText = "✨ 愿你所求皆如愿 ✨";
    document.getElementById("title").style.fontSize = "26px";
    document.getElementById("sub-title").innerText = "🎂 祝你生日快乐 🥂";
    document.getElementById("blowBtn").style.display = "none";

    // 4. 隐藏蛋糕，显示相册
    document.getElementById("cake").style.display = "none";
    document.getElementById("album").style.display = "block";

    // 5. 启动功能
    startSlideshow();
    launchFireworks();
}

// 轮播图逻辑 (淡入淡出效果)
function startSlideshow() {
    const slideImg = document.getElementById("slideImg");
    
    // 初始化第一张图
    slideImg.src = photos[currentPhotoIndex];
    setTimeout(() => { slideImg.style.opacity = 1; }, 100); // 稍微延迟一下让淡入生效

    // 每 3.5 秒切换一次图片
    setInterval(() => {
        // 先淡出
        slideImg.style.opacity = 0;
        
        // 等淡出动画结束后（800ms），换图并淡入
        setTimeout(() => {
            currentPhotoIndex = (currentPhotoIndex + 1) % photos.length;
            slideImg.src = photos[currentPhotoIndex];
            slideImg.style.opacity = 1;
        }, 800); 
    }, 3500);
}

// --- 烟花与背景特效代码保留原样 ---
function generatePageBackground() {
    const bg = document.getElementById("pageBg");
    for (let i = 0; i < 20; i++) {
        const p = document.createElement("div");
        p.style.position = "absolute";
        const size = Math.random() * 80 + 20;
        p.style.width = size + "px"; p.style.height = size + "px";
        p.style.borderRadius = "50%";
        p.style.background = `rgba(${Math.random()*255}, ${Math.random()*255}, ${Math.random()*255}, 0.2)`;
        p.style.filter = "blur(10px)";
        p.style.left = Math.random() * 100 + "vw";
        p.style.top = Math.random() * 100 + "vh";
        p.style.animation = `floatBg ${Math.random()*20 + 10}s infinite ease-in-out`;
        bg.appendChild(p);
    }
}

function launchFireworks() {
    const container = document.getElementById("particlesContainer");
    const end = Date.now() + 15 * 1000;
    const interval = setInterval(() => {
        if (Date.now() > end) return clearInterval(interval);
        const x = Math.random() * window.innerWidth;
        const y = Math.random() * window.innerHeight * 0.7;
        const color = fireworkColors[Math.floor(Math.random() * fireworkColors.length)];
        for (let i = 0; i < 30; i++) createParticle(x, y, color, container);
    }, 350);
}

function createParticle(x, y, color, container) {
    const p = document.createElement("div");
    p.className = "firework";
    p.style.left = x + "px"; p.style.top = y + "px";
    p.style.backgroundColor = color; p.style.color = color;
    container.appendChild(p);
    const angle = Math.random() * Math.PI * 2;
    const velocity = Math.random() * 150 + 60;
    const tx = Math.cos(angle) * velocity; const ty = Math.sin(angle) * velocity;
    const anim = p.animate([
        { transform: 'translate(0, 0) scale(1)', opacity: 1 },
        { transform: `translate(${tx}px, ${ty}px) scale(0)`, opacity: 0 }
    ], { duration: 1000 + Math.random() * 500, easing: 'cubic-bezier(0, .9, .57, 1)' });
    anim.onfinish = () => p.remove();
}

const styleSheet = document.createElement("style");
styleSheet.innerText = `@keyframes floatBg { 0%, 100% { transform: translate(0, 0); } 50% { transform: translate(${Math.random()*50-25}px, ${Math.random()*50-25}px); } }`;
document.head.appendChild(styleSheet);
</script>

</body>
</html>
