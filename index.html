<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>生日快乐 🎂</title>

<style>
body {
    margin: 0;
    background: #f5f5f5;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}

/* 页面容器（类似小程序页面） */
.page {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* 卡片 */
.card {
    width: 90%;
    max-width: 420px;
    background: white;
    border-radius: 20px;
    padding: 25px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

/* 标题 */
h1 {
    font-size: 26px;
    color: #ff6b81;
    margin-bottom: 10px;
}

/* 文本 */
p {
    color: #666;
    font-size: 16px;
}

/* 按钮 */
.btn {
    width: 100%;
    padding: 14px;
    margin-top: 15px;
    border-radius: 12px;
    border: none;
    font-size: 16px;
}

/* 主按钮 */
.primary {
    background: #ff6b81;
    color: white;
}

/* 次按钮 */
.secondary {
    background: #eee;
}

/* 爱心动画 */
.heart {
    position: absolute;
    color: pink;
    animation: float 5s linear infinite;
}

@keyframes float {
    from { transform: translateY(100vh); }
    to { transform: translateY(-10vh); }
}

/* 烟花 */
.firework {
    position: absolute;
    width: 5px;
    height: 5px;
    background: orange;
    border-radius: 50%;
}
</style>
</head>

<body>

<div class="page">
    <div class="card">
        <h1>🎂 生日快乐！</h1>
        <p>愿你每天开心，万事顺意 💖</p>

        <button class="btn primary" onclick="showSurprise()">🎁 打开惊喜</button>
        <button class="btn secondary" onclick="toggleMusic()">🎵 播放音乐</button>
    </div>
</div>

<!-- 生日歌 -->
<audio id="music" loop>
    <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_115b9bcb0b.mp3?filename=happy-birthday-254480.mp3">
</audio>

<script>
// 爱心
setInterval(() => {
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "💖";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = Math.random() * 20 + 20 + "px";
    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 5000);
}, 400);

// 烟花
document.addEventListener("click", (e) => {
    for (let i = 0; i < 15; i++) {
        let fw = document.createElement("div");
        fw.className = "firework";
        fw.style.left = e.clientX + "px";
        fw.style.top = e.clientY + "px";
        document.body.appendChild(fw);

        let angle = Math.random() * 2 * Math.PI;
        let d = Math.random() * 80;

        fw.animate([
            { transform: "translate(0,0)" },
            { transform: `translate(${Math.cos(angle)*d}px, ${Math.sin(angle)*d}px)` }
        ], { duration: 700 });

        setTimeout(() => fw.remove(), 700);
    }
});

// 惊喜
function showSurprise() {
    alert("🎉 祝你生日快乐！愿所有美好都属于你 ✨");
}

// 音乐
function toggleMusic() {
    let m = document.getElementById("music");
    if (m.paused) m.play();
    else m.pause();
}
</script>

</body>
</html>
